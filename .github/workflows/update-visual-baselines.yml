name: Update Visual Baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update baselines on'
        required: false
        default: ''

permissions:
  contents: write

env:
  HUSKY: 0
  NODE_ENV: development
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_devdir: ''

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Clear existing baselines
        run: rm -rf cypress-image-diff-screenshots/baseline
      - name: Run visual tests to generate new baselines
        uses: cypress-io/github-action@v7
        with:
          start: npm run dev
          wait-on: 'http://localhost:4321'
          config: baseUrl=http://localhost:4321
          spec: 'cypress/e2e/visual/**/*.cy.js'
        env:
          CYPRESS_COVERAGE: false
      - name: Commit and push updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cypress-image-diff-screenshots/baseline/
          git diff --staged --quiet || git commit -m "chore(tests): update visual regression baselines [skip ci]"
          git push
